name: Canon Anchor Audit

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main ]

jobs:
  audit_canon_anchors:
    if: ${{ secrets.DATABASE_URL != '' }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run canon anchor audit
        run: npm run audit:canon:anchors

      - name: Upload canon anchor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canon-anchor-integrity-report
          path: |
            docs/engineering/canon-anchor-integrity-audit.md
            docs/engineering/canon-anchor-integrity-report.json
          if-no-files-found: warn
